name: Deploy to GitHub Pages

    on:
      push:
        branches: [ main ] # 만약 기본 브라우저가 master라면 master로 변경해주세요
      workflow_dispatch:

    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: "pages"
      cancel-in-progress: false

    jobs:
      build:
        name: Build
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4
          - name: Setup Node
            uses: actions/setup-node@v4
            with:
              node-version: 20
              cache: npm # 사용하는 패키지 매니저에 따라 pnpm, yarn 등으로 변경 가능
          - name: Setup Pages
            uses: actions/configure-pages@v5
          - name: Install dependencies
            run: npm ci # 패키지 설치
          - name: Build with Astro
            run: npm run build
          - name: Upload artifact
            uses: actions/upload-pages-artifact@v3
            with:
              path: ./dist # Astro의 기본 빌드 결과물 폴더

      deploy:
        environment:
          name: github-pages
          url: ${{ steps: deployment.outputs.page_url }}
        needs: build
        runs-on: ubuntu-latest
        name: Deploy
        steps:
          - name: Deploy to GitHub Pages
            id: deployment
            uses: actions/deploy-pages@v4
    ```
  
